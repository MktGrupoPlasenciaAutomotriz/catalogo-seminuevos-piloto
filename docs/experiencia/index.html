<style>
  :root {
    --color-primary: #0F0F0F;
    --color-primary-2: #000000;
    --color-primary-3: #1C1C1C;
    --color-accent: #FBC645;
    --color-accent-2: #FFD66B;
    --color-accent-hover: #E5B232;
    --color-cyan: #17B7E0;
    --color-cyan-bright: #28B8E2;
    --color-conversion: #C8102E;
    --color-success: #48BB78;
    --color-warning: #D69E2E;
    --color-error: #E53E3E;
    --ink-50: #F7F9FC;
    --ink-100: #EEF2F8;
    --ink-200: #E2E8F0;
    --ink-300: #CBD5E0;
    --ink-400: #A0AEC0;
    --ink-500: #718096;
    --ink-600: #4A5568;
    --ink-700: #2D3748;
    --ink-800: #1A202C;
    --ink-900: #0F1419;
    --font-display: 'Montserrat', sans-serif;
    --font-body: 'Inter', sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
    --shadow-md: 0 6px 16px -4px rgba(15,23,42,0.10), 0 2px 6px rgba(15,23,42,0.05);
    --shadow-lg: 0 18px 40px -12px rgba(15,23,42,0.18), 0 6px 14px -6px rgba(15,23,42,0.08);
    --duration-fast: 160ms;
    --duration-normal: 260ms;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--ink-800);
    background: var(--ink-50);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
  }
  /* Header sticky con logo + progress */
  .app-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--color-primary);
    padding: 14px 20px 12px;
    box-shadow: var(--shadow-md);
  }
  .app-header .row {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 640px; margin: 0 auto;
  }
  .brand {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: #fff;
    display: flex; align-items: center; gap: 8px;
  }
  .brand .gold-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--color-accent);
  }
  .progress-counter {
    font-family: var(--font-body);
    font-size: 12px; font-weight: 500;
    color: var(--ink-300);
    letter-spacing: 0.04em;
  }
  .progress-bar {
    height: 3px; background: rgba(255,255,255,0.12);
    border-radius: 2px; overflow: hidden; margin-top: 12px;
    max-width: 640px; margin-left: auto; margin-right: auto;
  }
  .progress-fill {
    height: 100%; background: var(--color-accent);
    transition: width var(--duration-normal) var(--ease);
    border-radius: 2px;
  }
  /* Main container */
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 120px;
  }
  /* Cards */
  .card {
    background: #fff;
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--ink-100);
  }
  .card + .card { margin-top: 16px; }
  /* Tipografia */
  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 26px;
    line-height: 1.18;
    color: var(--ink-900);
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }
  h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 19px;
    line-height: 1.3;
    color: var(--ink-900);
    margin: 0 0 12px;
    letter-spacing: -0.005em;
  }
  p { line-height: 1.55; color: var(--ink-700); margin: 0 0 14px; }
  p.muted { color: var(--ink-500); font-size: 14px; }
  .lead-context {
    background: linear-gradient(135deg, rgba(251,198,69,0.08), rgba(23,183,224,0.05));
    border: 1px solid rgba(251,198,69,0.25);
    border-radius: var(--radius-md);
    padding: 18px 18px 14px;
    margin: 18px 0 22px;
  }
  .lead-context .row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 4px 0;
    font-size: 14.5px;
  }
  .lead-context .row span:first-child {
    width: 22px; flex-shrink: 0; opacity: 0.85;
  }
  .lead-context .row strong {
    font-weight: 600; color: var(--ink-900);
  }
  .disclaimer {
    font-size: 12.5px; color: var(--ink-500);
    margin-top: 12px; padding-top: 12px;
    border-top: 1px dashed var(--ink-200);
  }
  /* Opciones radio */
  .options { display: flex; flex-direction: column; gap: 10px; margin: 16px 0 0; }
  .option {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--ink-50);
    border: 1.5px solid var(--ink-200);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--duration-fast) var(--ease);
    font-size: 15px;
    color: var(--ink-800);
    min-height: 52px;
    -webkit-tap-highlight-color: transparent;
  }
  .option:hover { border-color: var(--ink-400); }
  .option input[type="radio"] {
    width: 20px; height: 20px;
    accent-color: var(--color-accent-hover);
    cursor: pointer; flex-shrink: 0;
  }
  .option.selected {
    background: rgba(251,198,69,0.10);
    border-color: var(--color-accent);
    box-shadow: 0 0 0 3px rgba(251,198,69,0.12);
  }
  /* Escala 1-5 */
  .scale {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; margin: 18px 0 8px;
  }
  .scale-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 14px 6px;
    background: var(--ink-50);
    border: 1.5px solid var(--ink-200);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--duration-fast) var(--ease);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--ink-800);
    min-height: 70px;
    -webkit-tap-highlight-color: transparent;
  }
  .scale-btn small {
    display: block; margin-top: 4px;
    font-family: var(--font-body); font-weight: 500;
    font-size: 10.5px; color: var(--ink-500);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .scale-btn:hover { border-color: var(--ink-400); }
  .scale-btn.selected {
    background: var(--color-accent);
    border-color: var(--color-accent-hover);
    color: var(--ink-900);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .scale-labels {
    display: flex; justify-content: space-between;
    font-size: 11.5px; color: var(--ink-500);
    margin-top: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  /* Textarea */
  textarea {
    width: 100%;
    padding: 14px 16px;
    background: var(--ink-50);
    border: 1.5px solid var(--ink-200);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink-800);
    resize: vertical;
    min-height: 120px;
    transition: border-color var(--duration-fast) var(--ease);
  }
  textarea:focus {
    outline: none;
    border-color: var(--color-cyan);
    box-shadow: 0 0 0 3px rgba(23,183,224,0.15);
  }
  .char-counter {
    text-align: right; font-size: 12px; color: var(--ink-400);
    margin-top: 6px;
  }
  /* Botones */
  .actions {
    display: flex; gap: 10px; margin-top: 28px;
    justify-content: space-between;
  }
  .btn {
    padding: 14px 22px;
    border-radius: var(--radius-full);
    border: none;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all var(--duration-fast) var(--ease);
    -webkit-tap-highlight-color: transparent;
    min-height: 50px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary {
    background: var(--color-primary);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover { background: var(--color-primary-3); }
  .btn-primary:disabled {
    background: var(--ink-300); color: var(--ink-500);
    cursor: not-allowed;
  }
  .btn-primary.cta-cierre {
    background: var(--color-accent);
    color: var(--ink-900);
    font-weight: 700;
  }
  .btn-primary.cta-cierre:hover { background: var(--color-accent-hover); }
  .btn-ghost {
    background: transparent; color: var(--ink-600);
    border: 1.5px solid var(--ink-200);
    padding: 14px 20px;
  }
  .btn-ghost:hover { border-color: var(--ink-400); color: var(--ink-800); }
  .btn-wa {
    background: #25D366; color: #fff;
    width: 100%; margin-top: 8px;
  }
  .btn-wa:hover { background: #1ebe5d; }
  /* Loading / Error states */
  .state-msg {
    text-align: center; padding: 60px 20px;
  }
  .state-msg .icon { font-size: 48px; margin-bottom: 12px; }
  .state-msg h2 { margin: 0 0 8px; }
  .state-msg p { color: var(--ink-600); }
  /* Animation */
  .step { animation: fadeIn 260ms var(--ease); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Cierre */
  .cierre-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--color-accent), var(--color-accent-2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 18px;
    box-shadow: var(--shadow-md);
  }
  /* Footer institucional */
  .institutional-footer {
    text-align: center; padding: 24px 20px;
    color: var(--ink-400); font-size: 12px;
    letter-spacing: 0.04em;
  }
  /* Mobile tweaks */
  @media (max-width: 420px) {
    h1 { font-size: 23px; }
    h2 { font-size: 17.5px; }
    .card { padding: 24px 20px; }
    .scale-btn { font-size: 19px; min-height: 64px; }
    .scale-btn small { font-size: 9.5px; }
  }
</style>

<script>
const API_BASE = 'https://crm-plasencia.grupo-plasencia-automotriz.workers.dev';
const DIRECTOR_WA = '5212227083255';

const params = new URLSearchParams(location.search);
const TOKEN = params.get('t') || params.get('token') || '';

let surveyData = null;
let answers = {};
let stepIndex = 0;

// ── Tracking context (mismo patron que landing Seminuevos canonica) ──
// UTM, click IDs, ga_client_id (de cookie _ga), folio del lead.
// Se incluye en cada dataLayer.push para mantener atribucion en GA4.
function getTrackingContext() {
  const utm = {};
  const u = new URLSearchParams(location.search);
  ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','gclid','fbclid','msclkid','wbraid','gbraid','ttclid'].forEach(k => {
    const v = u.get(k); if (v) utm[k] = v;
  });
  let gaClientId = '';
  try {
    const m = document.cookie.match(/_ga=GA1\.\d+\.([0-9]+\.[0-9]+)/);
    if (m) gaClientId = m[1];
  } catch(e) {}
  return {
    ga_client_id: gaClientId,
    folio: surveyData?.folio || '',
    marca: 'seminuevos',
    sucursal: surveyData?.sucursal || '',
    vendedor_asignado: surveyData?.vendedor_nombre || '',
    etapa_origen: surveyData?.etapa_al_enviar || '',
    ...utm,
  };
}

// SPA navigation: cada paso es un "page" en GA4 via virtual_pageview.
// Usamos hash (#paso-N) en lugar de pathname porque seminuevos.grupoplasencia.com
// no tiene server-side routing para /experiencia/<step>.
function spaSetStep(stepId, titleSuffix) {
  const hash = '#' + stepId;
  const targetUrl = location.pathname + location.search + hash;
  if (location.pathname + location.search + location.hash !== targetUrl) {
    try { history.replaceState({ step: stepId }, '', targetUrl); } catch(e) {}
  }
  const title = 'Voz del Cliente · ' + (titleSuffix || stepId);
  document.title = title;
  if (typeof dataLayer !== 'undefined') {
    dataLayer.push({
      event: 'virtual_pageview',
      page_path: targetUrl,
      page_title: title,
      page_location: location.origin + targetUrl,
      step: stepId,
      ...getTrackingContext(),
    });
  }
}

// Definicion del flujo de pantallas con logica condicional
const FLOW = [
  { id: 'welcome',   render: renderWelcome },
  { id: 'q1',        render: () => renderRadio('q1',
      '¿Recuerdas haber registrado tu interés en un auto con Plasencia Seminuevos?', [
        { v: 'si',          label: 'Sí, lo recuerdo' },
        { v: 'no_recuerdo', label: 'No recuerdo bien' },
        { v: 'no_fui_yo',   label: 'No fui yo, alguien usó mi información' },
      ]),
    next: () => answers.q1 === 'no_fui_yo' ? 'cierre_fraude' : 'q2'
  },
  { id: 'q2',        render: () => renderRadio('q2',
      '¿Alguien del equipo de Plasencia te contactó después de tu registro?', [
        { v: 'varias_veces',   label: 'Sí, varias veces' },
        { v: 'una_vez',        label: 'Sí, una vez' },
        { v: 'no_contactado',  label: 'No me han contactado' },
        { v: 'no_recuerdo',    label: 'No recuerdo' },
      ]),
    next: () => (answers.q2 === 'no_contactado' || answers.q2 === 'no_recuerdo') ? 'q4' : 'q3'
  },
  { id: 'q3',        render: () => renderRadio('q3',
      '¿Qué tan rápido te contactaron desde que diste tus datos?', [
        { v: 'mismo_dia',     label: 'El mismo día' },
        { v: 'al_siguiente',  label: 'Al día siguiente' },
        { v: 'dos_tres_dias', label: '2 o 3 días después' },
        { v: 'mas_tres_dias', label: 'Más de 3 días después' },
        { v: 'no_recuerdo',   label: 'No recuerdo' },
      ]),
    next: () => 'q4'
  },
  { id: 'q4',        render: () => renderRadio('q4',
      '¿Visitaste alguna sucursal de Plasencia Seminuevos?', [
        { v: 'si_fui',        label: 'Sí, fui a la sucursal' },
        { v: 'quise_ir',      label: 'Quise ir pero no se concretó' },
        { v: 'no_fui',        label: 'No fui a la sucursal' },
      ]),
    next: () => 'q4b'
  },
  // q4b/q4c/q4d — validación de compra real (detección de cartera robada)
  { id: 'q4b',       render: () => renderRadio('q4b',
      'Más allá de tu interés inicial, ¿finalmente compraste algún auto seminuevo en estos meses?', [
        { v: 'si',              label: 'Sí, compré un auto' },
        { v: 'sigo_buscando',   label: 'Sigo buscando, aún no compro' },
        { v: 'no',              label: 'No, ya no voy a comprar' },
      ]),
    next: () => answers.q4b === 'si' ? 'q4c' : postQ4Logic()
  },
  { id: 'q4c',       render: () => renderRadio('q4c',
      '¿Dónde lo compraste?', [
        { v: 'en_plasencia',     label: 'En Plasencia Seminuevos' },
        { v: 'en_otra_agencia',  label: 'En otra agencia' },
        { v: 'a_un_particular',  label: 'A un particular' },
        { v: 'prefiero_no_decir', label: 'Prefiero no decir' },
      ]),
    next: () => answers.q4c === 'en_plasencia' ? 'q4d' : postQ4Logic()
  },
  { id: 'q4d',       render: renderQ4d, next: () => postQ4Logic() },
  { id: 'q5',        render: () => renderScale('q5',
      'Califica la atención del vendedor que te atendió',
      'Pésima', 'Excelente'),
    next: () => 'q6'
  },
  { id: 'q6',        render: () => renderScale('q6',
      'Califica el seguimiento posterior (o la falta del mismo)',
      'Nulo o muy malo', 'Excelente'),
    next: () => (surveyData?.etapa_al_enviar === 'Ganada' || answers.q4b === 'si') ? 'q8' : 'q7'
  },
  { id: 'q7',        render: () => renderRadio('q7',
      'Si finalmente NO compraste con Plasencia, ¿cuál fue la razón principal?', [
        { v: 'precio',           label: 'El precio' },
        { v: 'no_convencio',     label: 'No me convenció el auto' },
        { v: 'otra_agencia',     label: 'Encontré algo mejor en otra agencia' },
        { v: 'mal_seguimiento',  label: 'Mal trato o seguimiento' },
        { v: 'deje_necesitarlo', label: 'Dejé de necesitarlo' },
        { v: 'sigo_proceso',     label: 'Sigo en proceso, no he decidido' },
        { v: 'otra',             label: 'Otra razón' },
      ]),
    next: () => 'q8'
  },
  { id: 'q8',        render: () => renderRadio('q8',
      '¿Comprarías un auto seminuevo con Plasencia en el futuro?', [
        { v: 'definitivamente_si',   label: 'Definitivamente sí' },
        { v: 'probablemente_si',     label: 'Probablemente sí' },
        { v: 'tal_vez',              label: 'Tal vez' },
        { v: 'probablemente_no',     label: 'Probablemente no' },
        { v: 'definitivamente_no',   label: 'Definitivamente no' },
      ]),
    next: () => 'q9'
  },
  { id: 'q9',        render: renderComment, next: () => 'submit' },
];

function $(sel) { return document.querySelector(sel); }
function setProgress(stepId) {
  const totalSteps = FLOW.length;
  const currentIdx = FLOW.findIndex(s => s.id === stepId);
  const counter = $('#progressCounter');
  const fill = $('#progressFill');
  if (stepId === 'welcome') { counter.textContent = ''; fill.style.width = '0%'; }
  else if (stepId === 'submit' || stepId === 'cierre' || stepId === 'cierre_fraude') {
    counter.textContent = ''; fill.style.width = '100%';
  } else {
    counter.textContent = `Pregunta ${currentIdx} de ${totalSteps - 1}`;
    fill.style.width = `${(currentIdx / (totalSteps - 1)) * 100}%`;
  }
}

async function init() {
  if (!TOKEN) { showError('Link invalido', 'Este enlace no contiene tu identificador. Vuelve a abrir el link que llego a tu WhatsApp.'); return; }
  try {
    const resp = await fetch(`${API_BASE}/api/lead/experiencia/${encodeURIComponent(TOKEN)}`);
    const data = await resp.json();
    if (!resp.ok) {
      if (data.error === 'expired') return showError('Link expirado', data.message || 'Este link ya expiró.');
      if (data.error === 'not_found') return showError('Link no encontrado', 'El link no es válido o ya expiró.');
      return showError('Error al cargar', 'No pudimos cargar tu encuesta. Intenta de nuevo en un momento.');
    }
    if (data.already_responded) {
      try { localStorage.removeItem('experiencia_pending_' + TOKEN); } catch(e){}
      return showSuccess('Ya respondiste esta encuesta', 'Gracias por haber compartido tu experiencia. Si quieres agregar algo, contáctanos por WhatsApp.');
    }
    surveyData = data;

    // RECOVERY: si hay respuestas pendientes de un submit fallido previo,
    // ofrece al cliente recuperarlas en lugar de empezar de cero.
    let pending = null;
    try {
      const raw = localStorage.getItem('experiencia_pending_' + TOKEN);
      if (raw) pending = JSON.parse(raw);
    } catch(e) {}

    if (pending && pending.responses && Object.keys(pending.responses).length > 0) {
      const minutesAgo = Math.round((Date.now() - new Date(pending.attempted_at).getTime()) / 60000);
      $('#app').innerHTML = `
        <div class="card step">
          <h2>Tenemos tus respuestas guardadas</h2>
          <p>Hace ${minutesAgo > 0 ? minutesAgo + ' min' : 'unos momentos'} intentaste enviar tu encuesta pero el envío no se completó. Tus respuestas están seguras en este dispositivo.</p>
          <div class="actions" style="flex-direction:column;gap:10px;">
            <button class="btn btn-primary cta-cierre" style="width:100%;" onclick="resumePending()">Enviar mis respuestas guardadas</button>
            <button class="btn btn-ghost" style="width:100%;" onclick="discardPending()">Empezar de nuevo</button>
          </div>
        </div>`;
      window._pendingPayload = pending;
      return;
    }

    goto('welcome');
  } catch (e) {
    showError('Sin conexión', 'Verifica tu internet e intenta de nuevo.');
  }
}

function showError(title, msg) {
  $('#progressCounter').textContent = ''; $('#progressFill').style.width = '0%';
  $('#app').innerHTML = `<div class="card state-msg"><div class="icon">⚠️</div><h2>${title}</h2><p>${msg}</p></div>`;
}

// Resume pending submit from localStorage
function resumePending() {
  if (!window._pendingPayload) return;
  answers = window._pendingPayload.responses || {};
  submit();
}
function discardPending() {
  try { localStorage.removeItem('experiencia_pending_' + TOKEN); } catch(e){}
  window._pendingPayload = null;
  goto('welcome');
}
function showSuccess(title, msg) {
  $('#progressCounter').textContent = ''; $('#progressFill').style.width = '100%';
  $('#app').innerHTML = `<div class="card state-msg"><div class="cierre-icon">✓</div><h2>${title}</h2><p>${msg}</p></div>`;
}

function goto(stepId) {
  stepIndex = FLOW.findIndex(s => s.id === stepId);
  setProgress(stepId);
  // SPA: actualiza URL + dispara virtual_pageview en cada paso
  const STEP_TITLES = {
    welcome: 'Bienvenida',
    q1: 'P1 — Recuerda registro',
    q2: 'P2 — Contacto recibido',
    q3: 'P3 — Velocidad de contacto',
    q4: 'P4 — Visita a sucursal',
    q4b: 'P5 — Compraste auto',
    q4c: 'P6 — Donde compraste',
    q4d: 'P7 — Modelo y sucursal',
    q5: 'P8 — Atencion vendedor',
    q6: 'P9 — Seguimiento',
    q7: 'P10 — Razon no compra',
    q8: 'P11 — Comprarias futuro',
    q9: 'P12 — Comentario libre',
    submit: 'Enviando',
    cierre: 'Gracias',
    cierre_fraude: 'Reporte fraude',
  };
  spaSetStep(stepId, STEP_TITLES[stepId] || stepId);
  if (stepId === 'submit') return submit();
  if (stepId === 'cierre_fraude') return renderCierreFraude();
  if (stepId === 'cierre') return renderCierre();
  const step = FLOW[stepIndex];
  if (step?.render) step.render();
}

        ${fecha ? `<div class="row"><span>📅</span><div>Registrado el <strong>${fecha}</strong></div></div>` : ''}
        <div class="disclaimer">Si algún dato no coincide contigo, escríbelo al final en el comentario.</div>

function renderRadio(key, question, options) {
  const opts = options.map(o => `
    <label class="option ${answers[key] === o.v ? 'selected' : ''}" data-v="${o.v}">
      <input type="radio" name="${key}" value="${o.v}" ${answers[key] === o.v ? 'checked' : ''}>
      <span>${o.label}</span>
    </label>
  `).join('');
  $('#app').innerHTML = `
    <div class="card step">
      <h2>${question}</h2>
      <div class="options">${opts}</div>
      <div class="actions">
        ${stepIndex > 1 ? '<button class="btn btn-ghost" onclick="back()">← Atrás</button>' : '<span></span>'}
        <button class="btn btn-primary" id="btnNext" ${answers[key] ? '' : 'disabled'} onclick="nextStep()">Siguiente →</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.option').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      answers[key] = el.dataset.v;
      $('#btnNext').disabled = false;
    });
  });
}

function renderScale(key, question, labelLow, labelHigh) {
  const buttons = [1,2,3,4,5].map(n => {
    const labels = ['Pésimo','Malo','Regular','Bueno','Excelente'];
    return `<button class="scale-btn ${answers[key] == n ? 'selected' : ''}" data-v="${n}">${n}<small>${labels[n-1]}</small></button>`;
  }).join('');
  $('#app').innerHTML = `
    <div class="card step">
      <h2>${question}</h2>
      <div class="scale">${buttons}</div>
      <div class="scale-labels"><span>${labelLow}</span><span>${labelHigh}</span></div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="back()">← Atrás</button>
        <button class="btn btn-primary" id="btnNext" ${answers[key] ? '' : 'disabled'} onclick="nextStep()">Siguiente →</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.scale-btn').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.scale-btn').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      answers[key] = el.dataset.v;
      $('#btnNext').disabled = false;
    });
  });
}

// Después de q4 (o q4b/c/d): si q2 fue "no me contactaron" → salta q5 (atención).
function postQ4Logic() {
  return (answers.q2 === 'no_contactado' || answers.q2 === 'no_recuerdo') ? 'q6' : 'q5';
}

  const v = answers.q4d || '';
  $('#app').innerHTML = `

      <p class="muted">A veces los registros internos se quedan incompletos. Ayúdanos a tener la información correcta.</p>
      <textarea id="q4dBox" maxlength="200" placeholder="ej. Mazda 3 2020, sucursal López Mateos, fecha aproximada marzo">${escapeHtml(v)}</textarea>
      <div class="char-counter"><span id="q4dCount">${v.length}</span> / 200</div>

function renderComment() {

    <div class="card step">

      <p class="muted">Opcional. Tu comentario lo lee directo el Director. Escribe lo que quieras.</p>

function saveCommentAndSubmit() {
  const box = $('#commentBox');
  if (box) answers.q9 = box.value.trim();
  goto('submit');
}

function back() {
  const currentStep = FLOW[stepIndex];
  if (!currentStep) return;
  if (stepIndex <= 1) return goto('welcome');
  goto(FLOW[stepIndex - 1].id);
}

function nextStep() {
  const step = FLOW[stepIndex];
  if (!step?.next) return;
  goto(step.next());
}

// Helper: POST con timeout 10s + retry exponencial (3 intentos)
async function submitWithRetry(payload, attempt = 1) {
  const TIMEOUT_MS = 10000;
  const MAX_ATTEMPTS = 3;
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
  try {
    const resp = await fetch(`${API_BASE}/api/lead/experiencia/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    return { ok: resp.ok, status: resp.status, data: await resp.json().catch(() => ({})) };
  } catch (e) {
    clearTimeout(timeoutId);
    // Reintenta network errors o timeouts hasta MAX_ATTEMPTS
    if (attempt < MAX_ATTEMPTS) {
      const backoffMs = Math.min(1000 * Math.pow(2, attempt - 1), 4000);
      await new Promise(r => setTimeout(r, backoffMs));
      return submitWithRetry(payload, attempt + 1);
    }
    return { ok: false, status: 0, data: {}, networkError: e.message || 'timeout' };
  }
}

async function submit() {
  // BACKUP CRITICO: guarda respuestas en localStorage ANTES de hacer cualquier
  // network call. Si el browser truena, el cliente recarga, o el submit falla,
  // las respuestas viven aqui y pueden recuperarse. Persiste hasta que el
  // submit sea exitoso confirmado por el servidor.
  const payload = { token: TOKEN, responses: answers, attempted_at: new Date().toISOString() };
  try { localStorage.setItem('experiencia_pending_' + TOKEN, JSON.stringify(payload)); } catch (e) {}

  $('#app').innerHTML = `<div class="card state-msg"><div class="icon">⏳</div><h2>Enviando tu respuesta...</h2><p class="muted" style="margin-top:14px;font-size:13px;">Esto puede tardar unos segundos. Por favor no cierres esta ventana.</p></div>`;

  const result = await submitWithRetry(payload);

  // Network/timeout despues de 3 intentos
  if (result.networkError) {
    if (typeof dataLayer !== 'undefined') {
      dataLayer.push({ event: 'experience_survey_submit_error', error_code: 'network_after_retry', error_msg: result.networkError, ...getTrackingContext() });
    }
    return showRetryableError('Tu respuesta NO se guardó', 'Tuvimos un problema de conexión. Tus respuestas están seguras en este dispositivo. Haz clic en "Intentar de nuevo" para enviarlas.', () => submit());
  }

  if (!result.ok) {
    if (result.data.error === 'already_responded') {
      try { localStorage.removeItem('experiencia_pending_' + TOKEN); } catch(e){}
      if (typeof dataLayer !== 'undefined') {
        dataLayer.push({ event: 'experience_survey_already_responded', ...getTrackingContext() });
      }
      return showSuccess('Ya respondiste esta encuesta', '¡Gracias por tu tiempo!');
    }
    if (typeof dataLayer !== 'undefined') {
      dataLayer.push({ event: 'experience_survey_submit_error', error_code: result.data.error || result.status, ...getTrackingContext() });
    }
    // No-network errors (400, 410, 500): show retryable error too
    return showRetryableError('No pudimos guardar tu respuesta', 'El servidor reportó un problema. Tus respuestas están seguras. Intenta de nuevo.', () => submit());
  }

  // ÉXITO CONFIRMADO por el servidor — limpia el backup
  try { localStorage.removeItem('experiencia_pending_' + TOKEN); } catch(e){}

  // ── EVENTO DE CONVERSION ───────────────────────────────────────────
  if (typeof dataLayer !== 'undefined') {
    dataLayer.push({
      event: 'experience_survey_completed',
      event_id: (surveyData?.folio || '') + '_ExperienciaSubmit',
      survey_id: result.data.survey_id,
      declaro_compra: answers.q4b || '',
      donde_compro: answers.q4c || '',
      atencion: answers.q5 || '',
      seguimiento: answers.q6 || '',
      compraria_futuro: answers.q8 || '',
      ...getTrackingContext(),
    });
  }
  renderCierre();
}

// Modal de error con boton de retry — NO destruye answers, permite reintentar
function showRetryableError(title, msg, retryFn) {
  $('#app').innerHTML = `
    <div class="card state-msg">
      <div class="icon">⚠️</div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <div style="margin-top:18px;">
        <button class="btn btn-primary" style="width:100%;background:var(--color-conversion);" onclick="window._retryFn && window._retryFn()">Intentar de nuevo</button>
      </div>
      <p style="margin-top:14px;font-size:12px;color:var(--ink-500);">Si el problema sigue, contáctanos por WhatsApp y mándanos tu nombre + folio: <strong>${surveyData?.folio || ''}</strong></p>
      <a class="btn btn-wa" style="margin-top:10px;" href="https://wa.me/${DIRECTOR_WA}?text=${encodeURIComponent('Hola, no pude enviar mi encuesta. Folio: ' + (surveyData?.folio || ''))}" target="_blank" rel="noopener">💬 Reportar el problema</a>
    </div>
  `;
  window._retryFn = retryFn;
}

function renderCierre() {
  setProgress('cierre');
  // Escape valve: si calificación atención o seguimiento <=2, ofrecemos contacto directo
  const atencion = parseInt(answers.q5 || '5', 10);
  const seguimiento = parseInt(answers.q6 || '5', 10);
  const ofrecerContacto = atencion <= 2 || seguimiento <= 2;
  const waMsg = encodeURIComponent(`Hola, soy ${surveyData?.primer_nombre || ''}. Acabo de responder la encuesta de experiencia (folio ${surveyData?.folio || ''}) y quería comentarte algo directamente.`);
  $('#app').innerHTML = `
    <div class="card step state-msg">
      <div class="cierre-icon">✓</div>
      <h2>¡Gracias, ${escapeHtml(surveyData?.primer_nombre || 'por tu tiempo')}!</h2>
      <p>Tu respuesta ya llegó al equipo de dirección. La vamos a usar para mejorar el servicio y entender dónde estamos fallando.</p>
      ${ofrecerContacto ? `
        <p class="muted" style="margin-top: 20px;">¿Quieres compartir más detalles directamente con el Director de Marketing?</p>
        <a class="btn btn-wa" href="https://wa.me/${DIRECTOR_WA}?text=${waMsg}" target="_blank" rel="noopener">
          💬 Hablar con el Director de Marketing por WhatsApp
        </a>
      ` : ''}
    </div>
  `;
}

function renderCierreFraude() {
  setProgress('cierre_fraude');

    <div class="card step state-msg">

        💬 Reportar al Director de Marketing por WhatsApp
      </a>
    </div>
  `;
  // Mandar submit con solo q1 para registrarlo
  fetch(`${API_BASE}/api/lead/experiencia/submit`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: TOKEN, responses: { q1: answers.q1 } })
  }).catch(()=>{});
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatFecha(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}
