name: Sync horario catalogo Seminuevos

on:
  schedule:
    # Cron horario: minuto 4 de cada hora (UTC). El feed XML de Maxipublica
    # se actualiza cada hora, el offset de 4 min es deliberado para que el
    # feed ya tenga la version fresca cuando descargamos.
    - cron: '4 * * * *'
  workflow_dispatch:  # Permite correrlo manualmente desde la pestaña Actions

concurrency:
  group: sync-catalogo
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Parse feed XML Maxipublica → catalogo.json
        run: python3 parser_xml_maxipublica.py

      - name: Sync a D1 vía crm-sync-worker
        env:
          CATALOG_SYNC_SECRET: ${{ secrets.CATALOG_SYNC_SECRET }}
        run: python3 sync_via_worker.py

      - name: Export catalogo piloto (D1 → JSON)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_RW_TOKEN }}
          CF_ACCOUNT_ID: 3a73c6035cae8b2bfab359a16ec44fca
          D1_DATABASE_ID: ad3e7ad8-55e0-4436-941a-6e299638af8e
        run: python3 export_catalogo_piloto.py

      - name: Sync textos marketing del HTML con inventario real
        run: python3 sync_landing_marketing.py

      - name: Commit y push catalogo-piloto.json + index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalogo-piloto.json docs/index.html
          git diff --cached --quiet && echo "Sin cambios en landing" || git commit -m "sync: catalogo + marketing $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Subir resumen como artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-output-${{ github.run_id }}
          path: |
            resumen_carga.txt
          if-no-files-found: ignore
          retention-days: 7
